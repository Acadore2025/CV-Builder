<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge — Resume Analyser</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0C0F1A;
  color: white;
  margin: 0;
}

.container {
  display: flex;
  height: 100vh;
}

.left {
  width: 35%;
  padding: 20px;
  background: #131729;
}

.right {
  width: 65%;
  padding: 20px;
  overflow-y: auto;
}

textarea {
  width: 100%;
  height: 200px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #F0B429;
  border: none;
  cursor: pointer;
}

.card {
  background: #131729;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <h2>Resume Analyzer</h2>

    <textarea id="resume-input" placeholder="Paste resume here"></textarea>

    <textarea id="jd-input" placeholder="Paste job description (optional)"></textarea>

    <select id="market">
      <option>India</option>
      <option>US</option>
      <option>UAE</option>
      <option>Europe</option>
    </select>

    <select id="level">
      <option value="fresher">Fresher</option>
      <option value="mid" selected>Mid</option>
      <option value="senior">Senior</option>
    </select>

    <button onclick="runAnalysis()">Analyse Resume</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div id="output">
      <h3>Results will appear here</h3>
    </div>
  </div>

</div>

<script>

// ---------------- SAFE JSON PARSER ----------------
async function safeParseJSON(text) {
  try {
    let clean = text.replace(/```json/g, '').replace(/```/g, '').trim();

    const start = clean.indexOf('{');
    const end = clean.lastIndexOf('}');

    if (start === -1 || end === -1) {
      throw new Error('No JSON found');
    }

    clean = clean.slice(start, end + 1);

    return JSON.parse(clean);

  } catch (e) {
    console.error('Parse error:', e);
    return null;
  }
}

// ---------------- PROMPT BUILDER ----------------
function buildPrompt(resume, jd, market, level) {

return `You are a resume analyzer. Return ONLY JSON.

RESUME:
${resume}

JOB DESCRIPTION:
${jd || "Not provided"}

MARKET: ${market}
LEVEL: ${level}

Return:
{
  "scores": {
    "overall": 0-100,
    "ats": 0-100,
    "skills": 0-100
  },
  "strengths": ["..."],
  "issues": ["..."],
  "suggestions": ["..."]
}`;
}

// ---------------- MAIN FUNCTION ----------------
async function runAnalysis() {

  const resume = document.getElementById('resume-input').value.trim();
  const jd = document.getElementById('jd-input').value.trim();
  const market = document.getElementById('market').value;
  const level = document.getElementById('level').value;

  if (!resume) {
    alert("Paste resume first");
    return;
  }

  document.getElementById('output').innerHTML = "<p>Loading...</p>";

  try {

    const response = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          {
            role: "user",
            content: buildPrompt(resume, jd, market, level)
          }
        ]
      })
    });

    const data = await response.json();

    const text = data.content?.[0]?.text || '';

    const parsed = await safeParseJSON(text);

    if (!parsed) {
      throw new Error("Invalid JSON from AI");
    }

    render(parsed);

  } catch (err) {
    document.getElementById('output').innerHTML =
      `<p style="color:red;">Error: ${err.message}</p>`;
  }
}

// ---------------- RENDER ----------------
function render(data) {

  document.getElementById('output').innerHTML = `

    <div class="card">
      <h3>Scores</h3>
      <p>Overall: ${data.scores.overall}</p>
      <p>ATS: ${data.scores.ats}</p>
      <p>Skills: ${data.scores.skills}</p>
    </div>

    <div class="card">
      <h3>Strengths</h3>
      <ul>
        ${data.strengths.map(s => `<li>${s}</li>`).join('')}
      </ul>
    </div>

    <div class="card">
      <h3>Issues</h3>
      <ul>
        ${data.issues.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>

    <div class="card">
      <h3>Suggestions</h3>
      <ul>
        ${data.suggestions.map(s => `<li>${s}</li>`).join('')}
      </ul>
    </div>

  `;
}

</script>

</body>
</html>
